version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentflow
      POSTGRES_PASSWORD: rentflow
      POSTGRES_DB: rentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow -d rentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rentflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rentflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: rentflow
      MINIO_ROOT_PASSWORD: rentflow-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rentflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rentflow:rentflow@postgres:5432/rentflow?schema=public
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - "3001:3001"
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:
